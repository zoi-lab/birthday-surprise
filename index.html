<!DOCTYPE html>
<html lang="en">
<head>

    <title>A Moment for You 💞</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <div id="entrance">
        <div class="aesthetic-box">
            <h2 class="soft-title">Some souls are just... <br><span>Pure Magic.</span></h2>

            <p class="deep-msg">
                "In a world full of temporary things, <br>
                you are a feeling I’d keep forever."
            </p>

            <button id="reveal-btn" onclick="startShow()">Step into the Magic ✨</button>
        </div>
    </div>

    <div id="video-stage" class="hidden">
        <video id="myVideo" playsinline>
            <source src="birthday.mp4" type="video/mp4">
        </video>
    </div>

    <script src="script.js"></script>
